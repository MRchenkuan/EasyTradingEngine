<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>交易监控面板</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
</head>

<body>
  <div class="header">
    <span class="header-title">交易监控</span>
    <span class="header-info" id="currentTime"></span>
    <span class="header-info">资产:<span id="assetCount">0</span></span>
    <span class="header-info ws-status">
      <span class="status-indicator" id="statusIndicator"></span>
    </span>
  </div>

  <div class="assets-container" id="assetsContainer">
    <div class="no-data">暂无资产数据</div>
  </div>

  <div class="logs-section">
    <div class="logs-title">实时日志</div>
    <div id="logsContainer"></div>
  </div>

  <script src="/js/utils/time.js"></script>
  <script src="/js/utils/websocket.js"></script>
  <script src="/js/utils/assets.js"></script>
  <script src="/js/utils/charts.js"></script>
  <script src="/js/utils/logs.js"></script>
  <script src="/js/app.js"></script>
</body>

</html>
